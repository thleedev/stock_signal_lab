name: Daily Batch

on:
  schedule:
    - cron: '*/15 23-11 * * 1-5'
    - cron: '10 7 * * 1-5'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '재수집 기준일 (YYYY-MM-DD, 빈칸이면 오늘)'
        required: false
      mode:
        description: 'full | repair | prices-only'
        required: false
        default: 'full'

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Detect mode
        id: detect-mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          INPUT_MODE="${{ inputs.mode }}"

          if [ -n "$INPUT_MODE" ]; then
            MODE="$INPUT_MODE"
          elif [ "$HOUR" = "07" ] && [ "$MINUTE" = "10" ]; then
            MODE="full"
          elif [ "$HOUR" = "22" ] && [ "$MINUTE" = "00" ]; then
            MODE="repair"
          else
            MODE="prices-only"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Detected mode: $MODE"

      - name: Run batch
        run: npx tsx batch/index.ts
        working-directory: .github/scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BATCH_MODE: ${{ steps.detect-mode.outputs.mode }}
          TARGET_DATE: ${{ inputs.date }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
